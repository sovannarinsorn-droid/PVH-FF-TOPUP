<!doctype html>
<html lang="km">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MRX TOPUP — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Kantumruy+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/admin.css">
</head>
<body>

<div id="loginBox" class="admin-login">
  <h2>Admin Login</h2>
  <input id="pwInput" type="password" placeholder="ពាក្យសម្ងាត់" />
  <button id="loginBtn" class="cta">ចូល</button>
  <p id="loginError" class="error hidden">ពាក្យសម្ងាត់មិនត្រឹមត្រូវ</p>
</div>

<div id="dashboard" class="admin-dashboard hidden">
  <header class="topbar">
    <span class="brand-name">MRX <em>TOPUP</em> — Admin</span>
    <a href="/index.html">← ទៅមើល Site</a>
  </header>

  <section class="admin-section">
    <h3>រូបភាពទូទៅ</h3>
    <div class="upload-grid">
      <div class="upload-slot">
        <p>Logo</p>
        <img id="preview-logo" class="preview" />
        <input type="file" data-target="logo" accept="image/*" />
      </div>
      <div class="upload-slot">
        <p>Hero Banner</p>
        <img id="preview-hero" class="preview" />
        <input type="file" data-target="hero" accept="image/*" />
      </div>
    </div>
  </section>

  <section class="admin-section">
    <h3>រូបភាពហ្គេម</h3>
    <div id="gameUploadGrid" class="upload-grid"></div>
  </section>

  <section class="admin-section">
    <h3>ការកម្ម៉ង់ថ្មីៗ (Orders)</h3>
    <table class="orders-table">
      <thead><tr><th>ហ្គេម</th><th>Package</th><th>UID</th><th>តម្លៃ</th><th>ស្ថានភាព</th><th>ពេលវេលា</th></tr></thead>
      <tbody id="ordersBody"></tbody>
    </table>
  </section>
</div>

<script src="/admin.js"></script>
</body>
</html>
